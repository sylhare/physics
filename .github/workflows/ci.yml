name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Unit Tests
        run: uv run pytest tests/unit -v

      - name: Run E2E Tests
        run: uv run pytest tests/e2e -v --tb=short

      - name: Verify notebook exports
        run: uv run python -m physics_explorations.export
